<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>
    {{ if .IsHome }}
      {{ .Site.Title }}
    {{ else }}
      {{ .Title }} | {{ .Site.Title }}
    {{ end }}
  </title>

  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <link rel="canonical" href="{{ .Permalink }}">

  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ .Site.Params.avatar | absURL }}">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" href="/favic1.jpg">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="/index.xml">

  <link rel="stylesheet" href="/css/style.css">

  <!-- Umami Analytics -->
  <script 
    defer 
    src="https://cloud.umami.is/script.js" 
    data-website-id="9e39dd1c-91fa-410a-aa1f-a16b5bf6f7f2">
  </script>

</head>
