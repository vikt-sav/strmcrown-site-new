<header class="site-header">
  <div class="container">

    <nav class="site-nav">

      {{ range .Site.Menus.main }}
        <a
          href="{{ .URL }}"
          class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">
          {{ .Name }}
        </a>
      {{ end }}

      {{ partial "theme-toggle.html" . }}

    </nav>

  </div>
</header>
