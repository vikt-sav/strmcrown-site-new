<header class="site-header">

  <nav class="site-nav">

    {{ range .Site.Menus.main }}
      <a
        href="{{ .URL }}"
        class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">
        {{ .Name }}
      </a>
    {{ end }}

    <!-- Theme toggle -->
    {{ partial "theme-toggle.html" . }}

  </nav>

</header>
