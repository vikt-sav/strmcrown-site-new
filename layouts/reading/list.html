{{ define "main" }}

<h1>{{ .Title }}</h1>

{{ .Content }}

<ul class="post-list">

{{ range .Pages.ByDate.Reverse }}

<li>

    <a href="{{ .RelPermalink }}">
        {{ .Title }}
    </a>

    <div class="post-date">
        {{ .Date.Format "2006-01-02" }}
    </div>

</li>

{{ end }}

</ul>

{{ end }}
