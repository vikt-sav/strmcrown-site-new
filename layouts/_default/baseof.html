<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {{ if .IsHome }}
            {{ .Site.Title }}
        {{ else }}
            {{ .Title }} | {{ .Site.Title }}
        {{ end }}
    </title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/favic1.jpg">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="9e39dd1c-91fa-410a-aa1f-a16b5bf6f7f2"></script>
</head>

<script>

window.addEventListener("scroll", function () {

    const pageHeight =
        document.documentElement.scrollHeight -
        window.innerHeight;

    const progress =
        window.scrollY / pageHeight;

    document
        .getElementById("reading-progress")
        .style.width = (progress * 100) + "%";

});

</script>

<body>
<div id="reading-progress"></div>
<header>

    <nav>

        {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}

    </nav>

</header>

<main>
    {{ block "main" . }}{{ end }}
</main>

<footer>

    <p>
        © {{ now.Year }} strmcrown
    </p>

</footer>

</body>
</html>
