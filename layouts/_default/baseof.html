<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">

  <title>
    {{ if .IsHome }}
      strmcrown
    {{ else }}
      {{ .Title }} · strmcrown
    {{ end }}
  </title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>

<body>

  <div class="page">

    <header class="site-header">

      <a class="site-title" href="{{ "/" | relURL }}">
        strmcrown
      </a>

      <nav class="site-nav" aria-label="Основная навигация">

        <a href="{{ "/science/" | relURL }}"
           class="{{ if eq .Section "science" }}active{{ end }}">
          science
        </a>

        <a href="{{ "/thoughts/" | relURL }}"
           class="{{ if eq .Section "thoughts" }}active{{ end }}">
          thoughts
        </a>

        <a href="{{ "/reading/" | relURL }}"
           class="{{ if eq .Section "reading" }}active{{ end }}">
          reading
        </a>

        <a href="{{ "/study/" | relURL }}"
           class="{{ if eq .Section "study" }}active{{ end }}">
          study
        </a>

        <a href="{{ "/programs/" | relURL }}"
           class="{{ if eq .Section "programs" }}active{{ end }}">
          programs
        </a>

        <a href="{{ "/hacks-contests/" | relURL }}"
           class="{{ if eq .Section "hacks-contests" }}active{{ end }}">
          hacks&contests
        </a>

        <a href="{{ "/photos/" | relURL }}"
           class="{{ if eq .Section "photos" }}active{{ end }}">
          photos
        </a>

      </nav>

    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

  </div>

</body>
</html>
