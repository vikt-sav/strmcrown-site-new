<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">

  <title>
    {{ if .IsHome }}
      strmcrown
    {{ else }}
      {{ .Title }} · strmcrown
    {{ end }}
  </title>

  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>

<body>

  <div class="page">

    <header class="site-header">

      <a class="site-title" href="{{ "/" | relURL }}">
        strmcrown
      </a>

      <nav class="site-nav" aria-label="Основная навигация">

        <a href="{{ "/science/" | relURL }}"
           class="{{ if eq .Section "science" }}active{{ end }}">
          science
        </a>

        <a href="{{ "/thoughts/" | relURL }}"
           class="{{ if eq .Section "thoughts" }}active{{ end }}">
          thoughts
        </a>

        <a href="{{ "/reading/" | relURL }}"
           class="{{ if eq .Section "reading" }}active{{ end }}">
          reading
        </a>

        <a href="{{ "/study/" | relURL }}"
           class="{{ if eq .Section "study" }}active{{ end }}">
          study
        </a>

        <a href="{{ "/programs/" | relURL }}"
           class="{{ if eq .Section "programs" }}active{{ end }}">
          programs
        </a>

        <a href="{{ "/hacks-contests/" | relURL }}"
           class="{{ if eq .Section "hacks-contests" }}active{{ end }}">
          hacks&contests
        </a>

        <a href="{{ "/photos/" | relURL }}"
           class="{{ if eq .Section "photos" }}active{{ end }}">
          photos
        </a>

      </nav>

    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

  </div>

</body>
</html>
