{{ define "main" }}

<article>

    <h1>{{ .Title }}</h1>
    <div class="post-meta">

{{ .Date.Format "02 Jan 2006" }}

·

{{ .ReadingTime }} мин чтения

    </div>

    <p class="post-date">
        {{ .Date.Format "02 Jan 2006" }}
    </p>

    {{ with .Params.tags }}

    <div class="tags">

        {{ range . }}

        <span class="tag">
            {{ . }}
        </span>

        {{ end }}

    </div>

    {{ end }}

    {{ .Content }}

</article>

{{ end }}
