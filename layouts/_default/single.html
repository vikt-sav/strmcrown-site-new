{{ define "main" }}

<article>

    <h1>{{ .Title }}</h1>

    <p class="post-date">
        {{ .Date.Format "2006-01-02" }}
    </p>

    {{ with .Params.tags }}

    <div class="tags">

        {{ range . }}

        <span class="tag">
            {{ . }}
        </span>

        {{ end }}

    </div>

    {{ end }}

    {{ .Content }}

</article>

{{ end }}
